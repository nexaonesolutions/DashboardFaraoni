<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OdontoGestão - Sistema Premium de Gestão Odontológica</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Dashboard premium de gestão clínica e agendamento odontológico completo." />
    
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: 'Inter', 'Outfit', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif;
      }
      
      /* Bespoke selection styles */
      ::selection {
        background-color: #e0e7ff;
        color: #4338ca;
      }
      
      /* Animation keyframes for modern elements */
      @keyframes slide-in {
        from { transform: translateY(0.5rem); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes zoom-in {
        from { transform: scale(0.98); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes progress {
        0% { width: 0%; }
        100% { width: 100%; }
      }
      
      .animate-slide-in {
        animation: slide-in 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-zoom-in {
        animation: zoom-in 0.18s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-fade-in {
        animation: fade-in 0.25s ease-out forwards;
      }
      .animate-progress {
        animation: progress 1.8s linear forwards;
      }
      
      /* custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
    </style>
  </head>
  <body class="bg-slate-50/50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
