<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OdontoGestão - Sistema Premium de Gestão Odontológica</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Dashboard premium de gestão clínica e agendamento odontológico completo." />
    
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: 'Inter', 'Outfit', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif;
      }
      
      /* Animation keyframes for modern elements */
      @keyframes slide-in {
        from { transform: translateY(1rem); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes zoom-in {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .animate-slide-in {
        animation: slide-in 0.25s ease-out forwards;
      }
      .animate-zoom-in {
        animation: zoom-in 0.2s ease-out forwards;
      }
    </style>
  </head>
  <body class="bg-slate-50/50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
